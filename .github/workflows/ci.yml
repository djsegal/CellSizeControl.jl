name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tests the CellSizeControl package from the repo root. The package is
# self-contained (Random + Statistics only) with no external data, so CI just
# instantiates and runs Pkg.test() -- the three-layer suite (L1 analytic /
# L2 reference / L3 cross-source) plus the Aqua, ExplicitImports, and JET
# quality gates declared in the test target.
jobs:
  test:
    name: Julia ${{ matrix.julia-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1.10", "1.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-runtest@v1
